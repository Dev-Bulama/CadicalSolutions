name: CI / CD — Cadical Solutions

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── 1. Lint & Type-check ───────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cadical

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ── 2. Build ───────────────────────────────────────────────────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cadical

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cadical
          BETTER_AUTH_SECRET: ci-test-secret-key-32chars-minimum
          BETTER_AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          PUSHER_APP_ID: "0"
          PUSHER_KEY: test
          PUSHER_SECRET: test
          PUSHER_CLUSTER: eu
          NEXT_PUBLIC_PUSHER_KEY: test
          NEXT_PUBLIC_PUSHER_CLUSTER: eu

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next
          retention-days: 1

  # ── 3. Database migration check ────────────────────────────────────────────
  db-check:
    name: Prisma Schema Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cadical

  # ── 4. Deploy to Staging ───────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [build, db-check]
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://staging.cadical.com
    steps:
      - uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /var/www/cadical-staging
            git pull origin staging
            npm ci --production
            npx prisma migrate deploy
            pm2 restart cadical-staging || pm2 start npm --name cadical-staging -- start
            echo "✅ Staging deployed"
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  # ── 5. Deploy to Production ────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build, db-check]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://cadical.com
    steps:
      - uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /var/www/cadical
            git pull origin main
            npm ci --production
            npx prisma migrate deploy
            pm2 restart cadical || pm2 start npm --name cadical -- start
            echo "✅ Production deployed"
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

  # ── 6. Notify on failure ───────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [lint, build, db-check]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "Pipeline failed on ${{ github.ref }} — ${{ github.sha }}"
          # Add Slack/email webhook here if needed
