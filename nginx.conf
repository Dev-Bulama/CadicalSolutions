##############################################################################
# Cadical Solutions — Nginx Configuration
# Place at /etc/nginx/sites-available/cadical and symlink to sites-enabled
##############################################################################

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

upstream cadical_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name cadical.com www.cadical.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cadical.com www.cadical.com;

    # SSL — managed by Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/cadical.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cadical.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.flutterwave.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com; connect-src 'self' wss://ws-eu.pusher.com https://api.zoho.com; font-src 'self'; frame-src https://checkout.flutterwave.com;" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Static Next.js assets — cache aggressively (content-hashed filenames)
    location /_next/static/ {
        alias /var/www/cadical/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Public folder
    location /icons/ {
        alias /var/www/cadical/public/icons/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /manifest.json {
        alias /var/www/cadical/public/manifest.json;
        expires 1d;
        add_header Cache-Control "public";
    }

    location /sw.js {
        alias /var/www/cadical/public/sw.js;
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Auth routes — stricter rate limit
    location ~ ^/api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://cadical_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes — rate limited
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://cadical_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://cadical_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    # Block common exploit paths
    location ~* \.(php|asp|aspx|jsp)$ {
        return 404;
    }
}
